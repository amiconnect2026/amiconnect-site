version: '3.8'
services:
  web:
    image: caddy:alpine
    container_name: amiconnect-landing
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./index.html:/usr/share/caddy/index.html:ro
      - ./privacy.html:/usr/share/caddy/privacy.html:ro
      - ./terms.html:/usr/share/caddy/terms.html:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.amiconnect.rule=Host(`amiconnect.com.br`) || Host(`www.amiconnect.com.br`)"
      - "traefik.http.routers.amiconnect.entrypoints=http"
      - "traefik.http.routers.amiconnect.service=amiconnect"
      - "traefik.http.services.amiconnect.loadbalancer.server.port=80"
      # HTTPS
      - "traefik.http.routers.amiconnect-secure.rule=Host(`amiconnect.com.br`) || Host(`www.amiconnect.com.br`)"
      - "traefik.http.routers.amiconnect-secure.entrypoints=https"
      - "traefik.http.routers.amiconnect-secure.tls=true"
      - "traefik.http.routers.amiconnect-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.amiconnect-secure.service=amiconnect"
      # Redirect HTTP -> HTTPS
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.amiconnect.middlewares=redirect-to-https"

networks:
  coolify:
    external: true
